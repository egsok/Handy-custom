name: "Release"

on:
  workflow_dispatch:
  push:
    tags: ["v*-*"]

jobs:
  create-release:
    permissions:
      contents: write
    runs-on: ubuntu-latest
    outputs:
      release-id: ${{ steps.create-release.outputs.result }}
      version: ${{ steps.get-version.outputs.version }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Get version from tauri.conf.json
        id: get-version
        shell: bash
        run: |
          VERSION=$(grep -o '"version": "[^"]*"' src-tauri/tauri.conf.json | cut -d'"' -f4)
          echo "Application version from tauri.conf.json: $VERSION"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Create Draft Release
        id: create-release
        uses: actions/github-script@v7
        with:
          script: |
            const { data } = await github.rest.repos.createRelease({
              owner: context.repo.owner,
              repo: context.repo.repo,
              tag_name: `v${{ steps.get-version.outputs.version }}`,
              name: `v${{ steps.get-version.outputs.version }}`,
              draft: true,
              prerelease: false,
              generate_release_notes: true
            })
            return data.id

  publish-tauri:
    permissions:
      contents: write
    needs: create-release
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: "macos-14" # ARM macs (Apple Silicon) — experimental, untested by maintainer
            args: "--target aarch64-apple-darwin"
            target: "aarch64-apple-darwin"
          - platform: "macos-15-intel" # Intel macs — experimental, untested by maintainer
            args: "--target x86_64-apple-darwin"
            target: "x86_64-apple-darwin"
          - platform: "ubuntu-22.04" # .deb (with ONNX Runtime injection)
            args: "--bundles deb"
            target: "x86_64-unknown-linux-gnu"
          - platform: "ubuntu-24.04" # AppImage + RPM
            args: "--bundles appimage,rpm"
            target: "x86_64-unknown-linux-gnu"
          - platform: "windows-latest"
            args: ""
            target: "x86_64-pc-windows-msvc"

    uses: ./.github/workflows/build.yml
    with:
      platform: ${{ matrix.platform }}
      target: ${{ matrix.target }}
      build-args: ${{ matrix.args }}
      sign-binaries: false
      asset-prefix: "handy"
      upload-artifacts: false
      release-id: ${{ needs.create-release.outputs.release-id }}
    secrets: inherit

  publish-release:
    permissions:
      contents: write
    needs: [create-release, publish-tauri]
    runs-on: ubuntu-latest
    if: success()
    steps:
      - name: Prepend Download link to release notes
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          BODY="$(gh release view "v${{ needs.create-release.outputs.version }}" --json body -q .body --repo "${{ github.repository }}")"
          gh release edit "v${{ needs.create-release.outputs.version }}" \
            --notes "$(printf 'See [Installation instructions](https://github.com/egsok/Handy-custom#download) in README.\n\n%s' "$BODY")" \
            --repo "${{ github.repository }}"

      - name: Flip draft to false
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh release edit "v${{ needs.create-release.outputs.version }}" --draft=false --repo "${{ github.repository }}"
